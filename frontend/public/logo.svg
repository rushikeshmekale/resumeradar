<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>
  <!-- Inner ring border -->
  <rect x="2" y="2" width="508" height="508" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>

  <!-- Radar / target icon centered -->
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="white" stroke-width="28" stroke-opacity="0.9"/>
  <!-- Middle circle -->
  <circle cx="256" cy="256" r="78" fill="none" stroke="white" stroke-width="24" stroke-opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="28" fill="white" fill-opacity="0.95"/>
  <!-- Sweep line -->
  <line x1="256" y1="256" x2="356" y2="126" stroke="white" stroke-width="22" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Small blip dot on sweep -->
  <circle cx="330" cy="158" r="16" fill="white" fill-opacity="0.6"/>
</svg>
